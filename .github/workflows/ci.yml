name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/CompraProgramada.UnitTests/CompraProgramada.UnitTests.csproj --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/CompraProgramada.IntegrationTests/CompraProgramada.IntegrationTests.csproj --no-build --configuration Release --verbosity normal
