services:
  mysql:
    image: mysql:8.0
    container_name: compra-programada-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: compra_programada
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: compra-programada-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: compra-programada-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  api:
    build: .
    container_name: compra-programada-api
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=compra_programada;User=appuser;Password=apppass123;"
      Kafka__BootstrapServers: "kafka:9092"
      CotacoesPath: "/app/cotacoes"
    volumes:
      - ./cotacoes:/app/cotacoes
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  mysql_data: